version: '3.8'

volumes:
  letsencrypt: # Let's Encrypt 인증서 저장 볼륨
  certbot: # Certbot 검증용 볼륨

services:
  frontend:
    build:
      context: ./frontend
    platform: linux/amd64
    image: minjegod/linux_gui_frontend:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always
    volumes:
      - letsencrypt:/etc/letsencrypt # Let's Encrypt 인증서
      - certbot:/var/www/certbot # Certbot 검증 디렉토리
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost} # AWS 도메인 설정

  backend:
    build:
      context: ./backend
    image: minjegod/linux_gui_backend:latest
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL
      - SECRET_KEY
      - ALGORITHM
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    privileged: false
    volumes:
      - /var/log:/var/log:ro
      - ./data/linux_web_gui.db:/app/linux_web_gui.db
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/webterm:/home/webterm
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    platform: linux/amd64
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'
    restart: always
    depends_on:
      - frontend