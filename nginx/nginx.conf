user nginx;
worker_processes auto; #cpu를 감지하여 코어수에 맞추어 프로세스 설정
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024; #각 프로세스가 동시에 1024개의 연결 처리 가능
}

http {
    include /etc/nginx/mime.types; #파일 확장자별 데이터 종류(html, css, jpg) 목록 가져오기
    default_type application/octet-stream; #종류를 알 수 없는 파일은 일단 이진 파일로 취급
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main; #위 main 형식으로 이 경로에 저장
    sendfile on; #파일 전송시 커널 메모리에서 직접 전송
    tcp_nopush on; #패킷 헤더와 데이터를 한 번에 보내도록 설정
    tcp_nodelay on; #지연 방지
    keepalive_timeout 65; #한 번 연결되면 65초 동안은 대기
    types_hash_max_size 2048; #파일 확장자와 MIME 타입 매핑 테이블 크기 설정
    client_max_body_size 20M; #파일 업로드 용량을 20MB로 제한

    gzip on;    #텍스트 데이터를 압축해서 보냄(네트워크 사용량 감소)
    gzip_vary on; 
    gzip_comp_level 6; #압축률 6단계(1-9)
    gzip_types text/plain text/css text/javascript application/json; #어떤 종류의 파일을 압축할지 설정

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;  #동일한 ip에서 초당 10개 이상의 요청이 오면 제한(디도스 방어)
  
    
    upstream api_backend { #컨테이터 이름(backend)이 도커 네트워크 상에서 IP로 변환되는 과정
        server backend:8000; #backend이름으로 요청시 8000포트로 전달
    }

    # ============================================================
    # HTTP → HTTPS 리디렉션
    # ============================================================
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt 인증서 검증용 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # 나머지 요청은 HTTPS로 리디렉션
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS 서버 설정
    # ============================================================
    server {
        listen 443 ssl http2; # SSL/TLS 포트, HTTP/2 지원
        server_name _; # 모든 도메인 허용 (프로덕션에서는 특정 도메인 설정 권장)

        # Let's Encrypt SSL 인증서 경로
        ssl_certificate /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
        
        # SSL 보안 설정
        ssl_protocols TLSv1.2 TLSv1.3; # TLS 1.2 이상만 사용
        ssl_ciphers HIGH:!aNULL:!MD5; # 강력한 암호화 스위트
        ssl_prefer_server_ciphers on; # 서버 우선 암호화 선택
        ssl_session_cache shared:SSL:10m; # SSL 세션 캐시
        ssl_session_timeout 10m;
        
        # HSTS (HTTP Strict Transport Security) - HTTPS 강제
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # 보안 헤더 추가
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            root /usr/share/nginx/html; #접속 시 기본 html 파일이 있는 경로
            try_files $uri $uri/ /index.html; #요청된 파일이 없으면 index.html로 전달 vite/react 배포시 필수 설정
            expires 1d; #정적 파일에 대한 캐시 설정, 1일 동안 다시 요청하지 않도록 브라우저에 지시
        }

        location /api/ { #주소에서 /api/ 요청을 보고 어느 컨테이너로 전달(proxy)할지 결정
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api_backend; # /api/요청은 api_backend로 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;    #사용자의 실제 IP 주소를 백엔드로 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }

        location /ws/ { #WebSocket 요청 전달
            proxy_pass http://api_backend; # /ws/ 요청도 api_backend로 전달
            proxy_http_version 1.1; #WebSocket은 HTTP/1.1 필수
            proxy_set_header Upgrade $http_upgrade; #웹소켓 업그레이드 요청 헤더
            proxy_set_header Connection "Upgrade"; #Connection을 Upgrade로 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; #WebSocket 연결 오래 유지 (24시간)
        }

        location /health { #헬스체크 엔드포인트
            access_log off;
            return 200 "healthy\n";
        }
    }
}
